<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>치과재료학 OX 퀴즈</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Dental Materials OX</p>
        <h1>치과재료학 OX 퀴즈</h1>
      </div>
      <div class="scorebox" aria-live="polite">
        <span id="answeredCount">0</span>/<span id="totalCount">0</span>
        <strong id="accuracy">0%</strong>
      </div>
    </header>

    <section class="controls" aria-label="퀴즈 설정">
      <label>
        <span>랜덤 시드</span>
        <input id="seedInput" type="number" min="1" value="2314" inputmode="numeric">
      </label>
      <label>
        <span>문항 수</span>
        <input id="limitInput" type="number" min="1" max="10000" value="60" inputmode="numeric">
      </label>
      <label>
        <span>단원</span>
        <select id="unitSelect">
          <option value="all">전체 단원</option>
        </select>
      </label>
      <button id="startButton" type="button">새로 출제</button>
    </section>

    <section class="progress" aria-label="풀이 진행">
      <button id="prevButton" type="button" aria-label="이전 문제">‹</button>
      <div class="progress-track">
        <div id="progressBar"></div>
      </div>
      <button id="nextButton" type="button" aria-label="다음 문제">›</button>
    </section>

    <section class="quiz-panel" aria-live="polite">
      <div class="question-meta">
        <span id="questionIndex">1 / 60</span>
        <span id="questionUnit">단원</span>
      </div>
      <p id="questionText" class="question-text"></p>
      <div class="answer-buttons" role="group" aria-label="정답 선택">
        <button id="answerO" class="answer answer-o" type="button" data-answer="O">O</button>
        <button id="answerX" class="answer answer-x" type="button" data-answer="X">X</button>
      </div>
      <div id="resultBox" class="result-box hidden">
        <div id="resultTitle" class="result-title"></div>
        <p id="explanationText"></p>
      </div>
    </section>

    <section class="jump-panel" aria-label="문제 이동">
      <div id="jumpGrid" class="jump-grid"></div>
    </section>

    <section class="wrong-panel">
      <div class="section-head">
        <h2>오답노트</h2>
        <div class="section-actions">
          <button id="copyWrongButton" type="button" disabled>텍스트 복사</button>
          <span id="wrongCount">0개</span>
        </div>
      </div>
      <div id="wrongList" class="wrong-list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
