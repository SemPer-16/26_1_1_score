<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#203548">
  <title>약리학통합 성적 리포트</title>
  <style>
    :root {
      --primary: #203548;
      --accent: #2f88cf;
      --success: #2d9d67;
      --danger: #de5c4b;
      --surface: #ffffff;
      --surface-soft: #f6f9fb;
      --muted: #667786;
      --line: #dde6ed;
      --shadow: 0 14px 34px rgba(32, 53, 72, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--primary);
      background:
        radial-gradient(circle at top, rgba(47, 136, 207, 0.16), transparent 26%),
        linear-gradient(180deg, #f8fbfd 0%, #eef4f7 45%, #f9fbfc 100%);
      min-height: 100vh;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(100%, 540px);
      margin: 0 auto;
      padding: 12px 12px 32px;
    }

    .hero {
      padding-top: max(12px, env(safe-area-inset-top));
      margin-bottom: 12px;
    }

    .hero-card {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      border-radius: 22px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .hero-title {
      margin: 0 0 5px;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .hero-copy {
      margin: 0 0 14px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .search-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 15px 16px;
      font-size: 1rem;
      color: var(--primary);
      background: #fff;
      outline: none;
    }

    .search:focus { box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3); }

    .action-btn {
      border-radius: 14px;
      padding: 15px 16px;
      background: #fff;
      color: var(--primary);
      min-width: 72px;
      font-weight: 800;
    }

    .chips, .search-suggestions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chips::-webkit-scrollbar,
    .search-suggestions::-webkit-scrollbar { display: none; }

    .search-suggestions {
      display: none;
      flex-wrap: wrap;
    }

    .search-suggestions.visible { display: flex; }

    .chip, .suggestion-btn {
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      padding: 9px 12px;
      font-size: 0.84rem;
      white-space: nowrap;
      font-weight: 700;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(221, 230, 237, 0.84);
      border-radius: 20px;
      box-shadow: 0 10px 26px rgba(32, 53, 72, 0.08);
    }

    .status {
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    .status-title {
      margin: 0 0 4px;
      font-size: 0.96rem;
      font-weight: 800;
    }

    .status-copy {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .match-list {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .match-btn {
      padding: 8px 12px;
      border-radius: 999px;
      background: #e8f4fd;
      color: var(--accent);
      font-size: 0.84rem;
      border: 1px solid #cfe5f7;
      font-weight: 700;
    }

    .report {
      display: none;
      padding: 16px;
    }

    .report.visible { display: block; }

    .identity {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .id-label {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .sub-line {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .rank-pill {
      background: #e8f4fd;
      color: var(--accent);
      border: 1px solid #cfe5f7;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 1.04rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .hero-score {
      margin-top: 14px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fafdff, #f3f8fb);
      border: 1px solid var(--line);
    }

    .hero-score-label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .hero-score-value {
      margin: 4px 0 0;
      font-size: 2.55rem;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .hero-score-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .compare-row {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .compare-item, .component-row {
      display: grid;
      grid-template-columns: 58px 1fr 72px;
      gap: 10px;
      align-items: center;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .compare-item strong,
    .component-row strong {
      color: var(--primary);
      text-align: right;
    }

    .score-with-max {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
      line-height: 1.15;
    }

    .score-max {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 700;
    }

    .track {
      height: 12px;
      border-radius: 999px;
      background: #dbe6ee;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--danger), #ffa071);
    }

    .fill.avg { background: linear-gradient(90deg, var(--accent), #82c6ff); }
    .fill.max { background: linear-gradient(90deg, var(--success), #8ad6a6); }
    .component-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--success));
    }

    .metric-grid {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .metric {
      padding: 12px;
      border-radius: 16px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 5px;
      font-weight: 800;
      font-size: 1.02rem;
    }

    .section, .chart-panel {
      margin-top: 14px;
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
    }

    .section-title {
      margin: 0 0 10px;
      font-size: 0.95rem;
      font-weight: 800;
    }

    .component-list { display: grid; gap: 10px; }

    .component-row {
      text-decoration: none;
      border-radius: 12px;
      padding: 4px;
      margin: -4px;
    }

    .component-row:hover,
    .component-row.active {
      background: #e8f4fd;
      color: var(--accent);
    }

    .component-row.active strong { color: var(--accent); }

    .summary-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    .summary-table td {
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }

    .summary-table tr:last-child td { border-bottom: 0; }

    .summary-table td:last-child {
      text-align: right;
      font-weight: 700;
      color: var(--primary);
    }

    .highlight-row td:last-child { color: var(--danger); }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .dot-point { cursor: pointer; }

    @media (max-width: 390px) {
      .hero-score-value { font-size: 2.25rem; }
      .compare-item, .component-row { grid-template-columns: 50px 1fr 52px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div class="hero-card">
        <h1 class="hero-title">약리학통합 성적 리포트</h1>
        <p class="hero-copy">비밀번호를 입력하면 약리학통합 총점과 중간/기말 점수를 확인할 수 있습니다.</p>
        <div class="search-wrap">
          <input id="searchInput" class="search" type="text" placeholder="비밀번호 입력" inputmode="numeric" autocomplete="off">
          <button id="showBtn" class="action-btn" type="button">조회</button>
        </div>
        <div class="search-suggestions" id="searchSuggestions"></div>
        <div class="chips">
          <button class="chip" type="button" data-sample-kind="top">상위권</button>
          <button class="chip" type="button" data-sample-kind="middle">중간권</button>
          <button class="chip" type="button" data-sample-kind="low">하위권</button>
          <button class="chip" id="resetBtn" type="button">초기화</button>
        </div>
      </div>
    </div>

    <section class="panel status">
      <h2 class="status-title" id="statusTitle">비밀번호를 입력하세요</h2>
      <p class="status-copy" id="statusCopy">일치하는 비밀번호가 있으면 아래에 개인 성적 리포트가 표시됩니다.</p>
      <div class="match-list" id="matchList"></div>
    </section>

    <section class="panel report" id="reportCard">
      <div class="identity">
        <div>
          <h2 class="id-label" id="studentName">-</h2>
          <p class="sub-line" id="studentSub">-</p>
        </div>
        <div class="rank-pill" id="rankBadge">-</div>
      </div>

      <div class="hero-score">
        <div class="hero-score-label">약리학통합 총점</div>
        <div class="hero-score-value" id="heroScoreValue">0점</div>
        <div class="hero-score-note" id="heroScoreNote">-</div>
        <div class="compare-row">
          <div class="compare-item">
            <span>내 점수</span>
            <div class="track"><div class="fill" id="scoreFill"></div></div>
            <strong id="scoreValue">0점</strong>
          </div>
          <div class="compare-item">
            <span>평균</span>
            <div class="track"><div class="fill avg" id="avgFill"></div></div>
            <strong id="avgValue">0점</strong>
          </div>
          <div class="compare-item">
            <span>최고점</span>
            <div class="track"><div class="fill max" id="maxFill"></div></div>
            <strong id="maxValue">0점</strong>
          </div>
        </div>
      </div>

      <div class="metric-grid">
        <div class="metric">
          <div class="metric-label">상위 비율</div>
          <div class="metric-value" id="topPercentValue">-</div>
        </div>
        <div class="metric">
          <div class="metric-label">표준점수</div>
          <div class="metric-value" id="standardScoreValue">-</div>
        </div>
      </div>

      <div class="section">
        <h3 class="section-title">세부 점수</h3>
        <div class="component-list" id="componentList"></div>
      </div>

      <div class="section">
        <h3 class="section-title">요약</h3>
        <table class="summary-table">
          <tbody id="statsBody"></tbody>
        </table>
      </div>

      <div class="chart-panel">
        <h3 class="section-title" id="histogramTitle">총점수 분포</h3>
        <svg id="histogramChart" viewBox="0 0 340 220" aria-label="총점수 분포 차트"></svg>
      </div>

      <div class="chart-panel">
        <h3 class="section-title" id="dotChartTitle">비밀번호별 위치</h3>
        <svg id="dotChart" viewBox="0 0 340 240" aria-label="비밀번호별 점수 위치"></svg>
      </div>
    </section>
  </div>

  <script>
    const students = [{"id":"308","total":32,"midterm":15,"final":17},{"id":"823","total":36,"midterm":20,"final":16},{"id":"924","total":34,"midterm":18,"final":16},{"id":"1024","total":36,"midterm":21,"final":15},{"id":"1030","total":34,"midterm":19,"final":15},{"id":"2763","total":22,"midterm":8,"final":14},{"id":"1428","total":31,"midterm":17,"final":14},{"id":"2922","total":26,"midterm":12,"final":14},{"id":"9715","total":32,"midterm":19,"final":13},{"id":"3867","total":27,"midterm":14,"final":13},{"id":"914","total":21,"midterm":8,"final":13},{"id":"7462","total":18,"midterm":5,"final":13},{"id":"4973","total":23,"midterm":10,"final":13},{"id":"8355","total":25,"midterm":13,"final":12},{"id":"3724","total":24,"midterm":12,"final":12},{"id":"1007","total":20,"midterm":9,"final":11},{"id":"414","total":26,"midterm":15,"final":11},{"id":"522","total":30,"midterm":19,"final":11},{"id":"720","total":25,"midterm":14,"final":11},{"id":"5926","total":19,"midterm":8,"final":11},{"id":"8486","total":25,"midterm":15,"final":10},{"id":"919","total":28,"midterm":18,"final":10},{"id":"9302","total":18,"midterm":8,"final":10},{"id":"3035","total":13,"midterm":3,"final":10},{"id":"4815","total":25,"midterm":15,"final":10},{"id":"4086","total":18,"midterm":8,"final":10},{"id":"607","total":26,"midterm":16,"final":10},{"id":"307","total":20,"midterm":11,"final":9},{"id":"3024","total":19,"midterm":10,"final":9},{"id":"5253","total":13,"midterm":4,"final":9},{"id":"6195","total":16,"midterm":7,"final":9},{"id":"8091","total":20,"midterm":11,"final":9},{"id":"809","total":15,"midterm":6,"final":9},{"id":"9626","total":25,"midterm":16,"final":9},{"id":"3017","total":18,"midterm":9,"final":9},{"id":"6459","total":22,"midterm":13,"final":9},{"id":"502","total":15,"midterm":7,"final":8},{"id":"2671","total":15,"midterm":7,"final":8},{"id":"1729","total":19,"midterm":11,"final":8},{"id":"3253","total":19,"midterm":11,"final":8},{"id":"2928","total":17,"midterm":9,"final":8},{"id":"8275","total":13,"midterm":6,"final":7},{"id":"1351","total":10,"midterm":3,"final":7},{"id":"4523","total":20,"midterm":13,"final":7},{"id":"5764","total":11,"midterm":4,"final":7},{"id":"7859","total":11,"midterm":4,"final":7},{"id":"1740","total":15,"midterm":8,"final":7},{"id":"6740","total":21,"midterm":14,"final":7},{"id":"1399","total":15,"midterm":8,"final":7},{"id":"4339","total":17,"midterm":11,"final":6},{"id":"116","total":18,"midterm":12,"final":6},{"id":"1211","total":13,"midterm":7,"final":6},{"id":"7356","total":12,"midterm":6,"final":6},{"id":"338","total":11,"midterm":5,"final":6},{"id":"423","total":12,"midterm":6,"final":6},{"id":"4634","total":15,"midterm":9,"final":6},{"id":"4200","total":12,"midterm":6,"final":6},{"id":"7244","total":13,"midterm":7,"final":6},{"id":"1429","total":11,"midterm":6,"final":5},{"id":"1429","total":11,"midterm":6,"final":5},{"id":"2929","total":11,"midterm":6,"final":5},{"id":"4278","total":13,"midterm":9,"final":4},{"id":"2077","total":13,"midterm":9,"final":4},{"id":"510","total":9,"midterm":6,"final":3},{"id":"9262","total":6,"midterm":3,"final":3},{"id":"2947","total":7,"midterm":4,"final":3},{"id":"2632","total":17,"midterm":15,"final":2},{"id":"1216","total":6,"midterm":4,"final":2}];
    const componentMeta = [
      { key: "midterm", label: "중간", max: 30 },
      { key: "final", label: "기말", max: 30 }
    ];
    const metricMeta = [{ key: "total", label: "약리학통합 총점", max: 60 }, ...componentMeta];
    const count = students.length;
    let currentMetricKey = "total";

    const searchInput = document.getElementById("searchInput");
    const searchSuggestions = document.getElementById("searchSuggestions");
    const showBtn = document.getElementById("showBtn");
    const resetBtn = document.getElementById("resetBtn");
    const reportCard = document.getElementById("reportCard");
    const dotChartSvg = document.getElementById("dotChart");
    const statusTitle = document.getElementById("statusTitle");
    const statusCopy = document.getElementById("statusCopy");
    const matchList = document.getElementById("matchList");

    function formatNumber(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(2);
    }

    function getMetric(key) {
      return metricMeta.find(item => item.key === key) || metricMeta[0];
    }

    function getScores(metricKey) {
      return students.map(student => student[metricKey]);
    }

    function getMetricStats(metricKey) {
      const scores = getScores(metricKey);
      const mean = scores.reduce((sum, value) => sum + value, 0) / count;
      const sortedScores = [...scores].sort((a, b) => a - b);
      const median = count % 2 === 0 ? (sortedScores[count / 2 - 1] + sortedScores[count / 2]) / 2 : sortedScores[Math.floor(count / 2)];
      const variance = scores.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / (count - 1);
      const std = Math.sqrt(variance);
      const minScore = Math.min(...scores);
      const topScore = Math.max(...scores);
      const scaleMax = Math.max(getMetric(metricKey).max, Math.ceil(topScore / 5) * 5);
      return { scores, mean, median, std, minScore, topScore, scaleMax };
    }

    function computeRank(score, metricKey) {
      const scores = getScores(metricKey);
      const higher = scores.filter(value => value > score).length;
      const tied = scores.filter(value => value === score).length;
      return { rank: higher + 1, tied, total: count };
    }

    function topPercentFromRank(rank) {
      return (rank / count) * 100;
    }

    function setStatus(title, copy, matches = []) {
      statusTitle.textContent = title;
      statusCopy.textContent = copy;
      matchList.innerHTML = "";
      matches.forEach(id => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "match-btn";
        button.textContent = id;
        button.addEventListener("click", () => {
          searchInput.value = id;
          renderStudentByQuery(id);
        });
        matchList.appendChild(button);
      });
    }

    function findMatches(query) {
      const normalized = query.trim();
      if (!normalized) return [];
      return students
        .filter(student => student.id.includes(normalized))
        .map(student => student.id)
        .slice(0, 12);
    }

    function renderSearchSuggestions(matches) {
      searchSuggestions.innerHTML = "";
      if (!matches.length) {
        searchSuggestions.classList.remove("visible");
        return;
      }

      matches.slice(0, 5).forEach(id => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "suggestion-btn";
        button.textContent = id;
        button.addEventListener("click", () => {
          searchInput.value = id;
          renderStudentByQuery(id);
        });
        searchSuggestions.appendChild(button);
      });
      searchSuggestions.classList.add("visible");
    }

    function renderComponents(student, metricKey) {
      const componentList = document.getElementById("componentList");
      componentList.innerHTML = "";
      const totalRow = document.createElement("a");
      totalRow.className = `component-row${metricKey === "total" ? " active" : ""}`;
      totalRow.href = `#total:${student.id}`;
      totalRow.innerHTML = `<span>합계</span><div class="track"><div class="component-fill" style="width: ${(student.total / getMetric("total").max) * 100}%"></div></div><strong class="score-with-max"><span>${formatNumber(student.total)}점</span><span class="score-max">/${getMetric("total").max}점</span></strong>`;
      componentList.appendChild(totalRow);

      componentMeta.forEach(item => {
        const value = student[item.key];
        const percent = Math.max(0, Math.min(100, (value / item.max) * 100));
        const row = document.createElement("a");
        row.className = `component-row${metricKey === item.key ? " active" : ""}`;
        row.href = `#${item.key}:${student.id}`;
        row.innerHTML = `<span>${item.label}</span><div class="track"><div class="component-fill" style="width: ${percent}%"></div></div><strong class="score-with-max"><span>${formatNumber(value)}점</span><span class="score-max">/${item.max}점</span></strong>`;
        componentList.appendChild(row);
      });
    }

    function renderStatsTable(student, metricKey) {
      const statsBody = document.getElementById("statsBody");
      const metric = getMetric(metricKey);
      const stats = getMetricStats(metricKey);
      const score = student[metricKey];
      const { rank, tied, total } = computeRank(score, metricKey);
      const topPercent = topPercentFromRank(rank);
      const zScore = stats.std > 0 ? (score - stats.mean) / stats.std : 0;
      const standardScore = Math.round(100 + 20 * zScore);
      const rows = [
        ["순위", `${rank}등${tied > 1 ? ` (공동 ${tied}명)` : ""}`],
        ["상위 비율", `${topPercent.toFixed(1)}%`],
        ["평균", `${stats.mean.toFixed(2)}점`],
        ["중앙값", `${stats.median.toFixed(2)}점`],
        ["표준편차", `${stats.std.toFixed(2)}`],
        ["최고 / 최저", `${formatNumber(stats.topScore)}점 / ${formatNumber(stats.minScore)}점`]
      ];

      statsBody.innerHTML = "";
      rows.forEach(([label, value], index) => {
        const tr = document.createElement("tr");
        if (index === 0 || index === 1) tr.className = "highlight-row";
        tr.innerHTML = `<td>${label}</td><td>${value}</td>`;
        statsBody.appendChild(tr);
      });

      document.getElementById("studentName").textContent = `비밀번호 ${student.id}`;
      document.getElementById("studentSub").textContent = `${total}명 중 ${score >= stats.mean ? "평균 이상" : "평균 미만"}`;
      document.getElementById("rankBadge").textContent = `${rank}등`;
      document.querySelector(".hero-score-label").textContent = `${metric.label} 점수`;
      document.getElementById("heroScoreValue").textContent = `${formatNumber(score)}점`;
      document.getElementById("heroScoreNote").textContent = `${metric.max}점 만점 · 평균 ${stats.mean.toFixed(2)}점 대비 ${score >= stats.mean ? "+" : ""}${(score - stats.mean).toFixed(2)}점`;
      document.getElementById("topPercentValue").textContent = `${topPercent.toFixed(1)}%`;
      document.getElementById("standardScoreValue").textContent = `${standardScore}점`;
      document.getElementById("histogramTitle").textContent = `${metric.label} 분포`;
      document.getElementById("dotChartTitle").textContent = `${metric.label} 비밀번호별 위치`;
      document.getElementById("scoreFill").style.width = `${(score / stats.scaleMax) * 100}%`;
      document.getElementById("avgFill").style.width = `${(stats.mean / stats.scaleMax) * 100}%`;
      document.getElementById("maxFill").style.width = `${(stats.topScore / stats.scaleMax) * 100}%`;
      document.getElementById("scoreValue").textContent = `${formatNumber(score)}점`;
      document.getElementById("avgValue").textContent = `${stats.mean.toFixed(1)}점`;
      document.getElementById("maxValue").textContent = `${formatNumber(stats.topScore)}점`;
      return { rank, topPercent };
    }

    function svgText(x, y, text, options = "") {
      return `<text x="${x}" y="${y}" ${options}>${text}</text>`;
    }

    function renderHistogram(student, metricKey) {
      const svg = document.getElementById("histogramChart");
      const metric = getMetric(metricKey);
      const stats = getMetricStats(metricKey);
      const width = 340;
      const height = 220;
      const margin = { top: 16, right: 12, bottom: 34, left: 28 };
      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;
      const bins = 8;
      const step = (stats.scaleMax - stats.minScore) / bins || 1;
      const counts = new Array(bins).fill(0);

      stats.scores.forEach(score => {
        const rawIndex = Math.floor((score - stats.minScore) / step);
        const index = Math.max(0, Math.min(bins - 1, rawIndex));
        counts[index] += 1;
      });

      const maxCount = Math.max(...counts);
      const barWidth = chartWidth / bins;
      const score = student[metricKey];
      const scoreX = margin.left + ((score - stats.minScore) / (stats.scaleMax - stats.minScore || 1)) * chartWidth;
      let content = "";

      for (let i = 0; i <= 4; i += 1) {
        const y = margin.top + (chartHeight / 4) * i;
        content += `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#e6eef4" stroke-width="1" />`;
      }

      counts.forEach((countValue, index) => {
        const barHeight = maxCount === 0 ? 0 : (countValue / maxCount) * (chartHeight - 10);
        const x = margin.left + index * barWidth + 3;
        const y = margin.top + chartHeight - barHeight;
        const leftScore = stats.minScore + index * step;
        const rightScore = leftScore + step;
        const highlighted = score >= leftScore && (score < rightScore || index === bins - 1);
        content += `<rect x="${x}" y="${y}" width="${barWidth - 6}" height="${barHeight}" rx="6" fill="${highlighted ? "#de5c4b" : "#5dade2"}" opacity="${highlighted ? "0.98" : "0.82"}" />`;
      });

      content += `<line x1="${scoreX}" y1="${margin.top - 2}" x2="${scoreX}" y2="${margin.top + chartHeight}" stroke="#c0392b" stroke-width="3" stroke-dasharray="6 6" />`;
      content += svgText(scoreX, margin.top - 6, formatNumber(score), 'text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b"');
      content += svgText(width - margin.right, height - 14, metric.label, 'text-anchor="end" font-size="10" fill="#667786"');
      svg.innerHTML = content;
    }

    function renderDotChart(student, metricKey) {
      const svg = dotChartSvg;
      const metric = getMetric(metricKey);
      const stats = getMetricStats(metricKey);
      const width = 340;
      const height = 240;
      const margin = { top: 16, right: 18, bottom: 34, left: 48 };
      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;
      const numericIds = students.map((entry, index) => {
        const parsed = Number(entry.id);
        return Number.isFinite(parsed) ? parsed : index;
      });
      const minId = Math.min(...numericIds);
      const maxId = Math.max(...numericIds);

      const yForScore = score => {
        const ratio = (score - stats.minScore) / (stats.topScore - stats.minScore || 1);
        return margin.top + chartHeight - ratio * chartHeight;
      };
      const xForId = id => {
        const parsed = Number(id);
        const safeId = Number.isFinite(parsed) ? parsed : minId;
        const ratio = (safeId - minId) / (maxId - minId || 1);
        return margin.left + ratio * chartWidth;
      };

      let content = `<line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" stroke="#d7e0e7" stroke-width="2" />`;
      const tickStep = metric.max <= 10 ? 1 : 5;
      for (let score = Math.floor(stats.minScore / tickStep) * tickStep; score <= Math.ceil(stats.topScore / tickStep) * tickStep; score += tickStep) {
        const y = yForScore(Math.max(stats.minScore, Math.min(stats.topScore, score)));
        content += `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" stroke="#edf2f6" stroke-width="1" />`;
        content += svgText(10, y + 4, `${score}`, 'font-size="10" fill="#667786"');
      }

      const xTicks = [minId, minId + (maxId - minId) / 3, minId + ((maxId - minId) * 2) / 3, maxId];
      xTicks.forEach(value => {
        const x = xForId(value);
        content += `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" stroke="#f1f5f8" stroke-width="1" />`;
        content += svgText(x, height - 10, `${Math.round(value)}`, 'text-anchor="middle" font-size="9" fill="#667786"');
      });

      students.forEach((entry, index) => {
        const baseX = xForId(entry.id);
        const y = yForScore(entry[metricKey]);
        const jitter = ((index % 3) - 1) * 4;
        const x = Math.max(margin.left + 4, Math.min(width - margin.right - 4, baseX + jitter));
        const isTarget = entry.id === student.id;
        content += `<circle class="dot-point" data-student="${entry.id}" cx="${x}" cy="${y}" r="${isTarget ? 8 : 5.2}" fill="${isTarget ? "#de5c4b" : "#85c1e9"}" stroke="${isTarget ? "#ffffff" : "transparent"}" stroke-width="2"><title>${entry.id} (${formatNumber(entry[metricKey])}점)</title></circle>`;
      });

      const studentX = xForId(student.id);
      const meanY = yForScore(stats.mean);
      content += `<line x1="${studentX}" y1="${margin.top}" x2="${studentX}" y2="${height - margin.bottom}" stroke="#de5c4b" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.55" />`;
      content += `<line x1="${margin.left}" y1="${meanY}" x2="${width - margin.right}" y2="${meanY}" stroke="#203548" stroke-width="2" stroke-dasharray="5 5" />`;
      content += svgText(width - 8, meanY - 5, `평균 ${stats.mean.toFixed(1)}`, 'text-anchor="end" font-size="10" fill="#203548" font-weight="700"');
      content += svgText(width - 8, margin.top + 10, "비밀번호", 'text-anchor="end" font-size="10" fill="#667786"');
      svg.innerHTML = content;
    }

    function renderStudent(student, metricKey = "total") {
      currentMetricKey = getMetric(metricKey).key;
      const metric = getMetric(currentMetricKey);
      const { rank, topPercent } = renderStatsTable(student, currentMetricKey);
      renderComponents(student, currentMetricKey);
      renderHistogram(student, currentMetricKey);
      renderDotChart(student, currentMetricKey);
      reportCard.classList.add("visible");
      setStatus(
        `${student.id} ${metric.label} 리포트가 표시되었습니다`,
        `${metric.label} ${formatNumber(student[currentMetricKey])}점, ${count}명 중 ${rank}등, 상위 ${topPercent.toFixed(1)}%입니다.`
      );
    }

    function renderStudentByQuery(query) {
      const normalized = query.trim();
      const exact = students.find(student => student.id === normalized);
      if (exact) {
        renderSearchSuggestions([]);
        renderStudent(exact, currentMetricKey);
        return;
      }

      const matches = findMatches(normalized);
      reportCard.classList.remove("visible");

      if (!normalized) {
        renderSearchSuggestions([]);
        setStatus("비밀번호를 입력하세요", "일치하는 비밀번호가 있으면 아래에 개인 성적 리포트가 표시됩니다.");
        return;
      }

      if (matches.length === 1) {
        renderSearchSuggestions([]);
        renderStudent(students.find(entry => entry.id === matches[0]), currentMetricKey);
        return;
      }

      if (matches.length > 1) {
        renderSearchSuggestions(matches);
        setStatus("여러 후보가 있습니다", "아래 비밀번호 버튼 중 하나를 선택하세요.", matches);
        return;
      }

      renderSearchSuggestions([]);
      setStatus("일치하는 비밀번호가 없습니다", "입력값을 다시 확인해 주세요.");
    }

    function sampleByKind(kind) {
      const ordered = [...students].sort((a, b) => b.total - a.total);
      if (kind === "top") return ordered[0].id;
      if (kind === "middle") return ordered[Math.floor(ordered.length / 2)].id;
      return ordered[ordered.length - 1].id;
    }

    function renderRoute() {
      const raw = decodeURIComponent(window.location.hash.replace(/^#/, ""));
      const [metricKey, studentId] = raw.split(":");
      const metric = getMetric(metricKey);
      const student = students.find(entry => entry.id === studentId);
      if (!student) return;
      searchInput.value = student.id;
      renderSearchSuggestions([]);
      renderStudent(student, metric.key);
    }

    showBtn.addEventListener("click", () => renderStudentByQuery(searchInput.value));
    searchInput.addEventListener("input", () => renderStudentByQuery(searchInput.value));
    searchInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        event.preventDefault();
        renderStudentByQuery(searchInput.value);
      }
    });

    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      reportCard.classList.remove("visible");
      renderSearchSuggestions([]);
      setStatus("비밀번호를 입력하세요", "일치하는 비밀번호가 있으면 아래에 개인 성적 리포트가 표시됩니다.");
      searchInput.focus();
    });

    document.querySelectorAll("[data-sample-kind]").forEach(button => {
      button.addEventListener("click", () => {
        const sample = sampleByKind(button.getAttribute("data-sample-kind"));
        searchInput.value = sample;
        renderStudentByQuery(sample);
      });
    });

    dotChartSvg.addEventListener("click", event => {
      const target = event.target;
      if (!(target instanceof SVGElement)) return;
      const studentId = target.getAttribute("data-student");
      if (!studentId) return;
      searchInput.value = studentId;
      window.location.hash = `${currentMetricKey}:${studentId}`;
    });

    window.addEventListener("hashchange", renderRoute);
    renderRoute();
  </script>
</body>
